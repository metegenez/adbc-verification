services:
  sr-main:
    build: .
    container_name: sr-main
    ports:
      - "9030:9030"
      - "9408:9408"
    volumes:
      - ./certs/:/opt/starrocks/certs/:ro
    networks:
      - sr-net
    depends_on:
      sr-external:
        condition: service_healthy
      sr-postgres:
        condition: service_healthy
      sr-mysql:
        condition: service_healthy
      sr-flightsql:
        condition: service_started
      sr-flightsql-tls:
        condition: service_started
    healthcheck:
      test: ["CMD", "mysql", "-uroot", "-h127.0.0.1", "-P9030", "-e", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 60s

  sr-postgres:
    image: postgres:16
    container_name: sr-postgres
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    volumes:
      - ./init/postgres/:/docker-entrypoint-initdb.d/:ro
      - ./data/sf1/:/sf1-data/:ro
    networks:
      - sr-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 300s

  sr-mysql:
    image: mysql:8.0
    container_name: sr-mysql
    command: ["--max-connections=500"]
    environment:
      MYSQL_ROOT_PASSWORD: testpass
      MYSQL_DATABASE: testdb
    volumes:
      - ./init/mysql/:/docker-entrypoint-initdb.d/:ro
      - ./data/sf1/:/var/lib/mysql-files/
    networks:
      - sr-net
    healthcheck:
      test: ["CMD", "mysql", "-h", "127.0.0.1", "--protocol=TCP", "-uroot", "-ptestpass", "-e", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 300s

  sr-flightsql:
    image: voltrondata/sqlflite:latest
    container_name: sr-flightsql
    environment:
      TLS_ENABLED: "0"
      SQLFLITE_PASSWORD: sqlflite_password
      PRINT_QUERIES: "1"
    networks:
      - sr-net

  sr-flightsql-tls:
    image: voltrondata/sqlflite:latest
    container_name: sr-flightsql-tls
    environment:
      TLS_ENABLED: "1"
      SQLFLITE_PASSWORD: sqlflite_password
      PRINT_QUERIES: "1"
    ports:
      - "31338:31337"
    networks:
      - sr-net

  sr-external:
    build: .
    container_name: sr-external
    ports:
      - "9031:9030"
      - "9418:9408"
    volumes:
      - ./certs/:/opt/starrocks/certs/:ro
      - ./init/sr-external/:/docker-entrypoint-initdb.d/:ro
      - ./data/sf1/:/opt/starrocks/data/sf1/:ro
    networks:
      - sr-net
    healthcheck:
      test: ["CMD", "mysql", "-uroot", "-h127.0.0.1", "-P9030", "-e", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 180s

networks:
  sr-net:
    driver: bridge
